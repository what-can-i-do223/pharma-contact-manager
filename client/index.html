<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Inline SVG favicon (a pill emoji) — no image file to serve, and it
         silences the browser's automatic /favicon.ico request, which showed
         up as a 404 in the console during headless verification. -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💊</text></svg>" />
    <title>Pharma Contact Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite serves src/main.jsx in dev and rewrites this path at build time -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
